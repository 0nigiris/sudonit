name: Deploy to GitHub Pages

# Builds the static Astro site and publishes it to GitHub Pages on every push
# to the default branch. Pure static — no server, no secrets needed here.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Permissions the official Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel a run that's mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3 # installs deps, runs `astro build`, uploads dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
